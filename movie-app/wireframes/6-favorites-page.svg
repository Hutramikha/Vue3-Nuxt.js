<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="1400" height="900" fill="#0f0f1e"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1400" height="70" fill="#1a1a2e" stroke="#444" stroke-width="1"/>
  <text x="50" y="45" font-size="20" font-weight="bold" fill="#6c5ce7">🎬 KHANLIX</text>
  
  <!-- Favorites Header -->
  <rect x="40" y="90" width="1320" height="60" fill="#2a2a3e" stroke="#6c5ce7" stroke-width="2" rx="4"/>
  <text x="60" y="130" font-size="16" font-weight="bold" fill="#ff6b6b">❤️ Phim Yêu Thích (5 phim)</text>
  
  <!-- Movie Cards Grid - Row 1 -->
  <g id="favorites-row1">
    <!-- Card 1 -->
    <rect x="20" y="180" width="320" height="420" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="1" rx="6"/>
    <rect x="30" y="190" width="300" height="200" fill="#2a2a3e" stroke="#444" stroke-width="1" rx="4"/>
    <text x="180" y="280" font-size="10" fill="#999" text-anchor="middle">Poster 1</text>
    <text x="40" y="410" font-size="12" font-weight="bold" fill="#fff">Favorite Movie 1</text>
    <text x="40" y="430" font-size="11" fill="#bbb">⭐ 9.0 | 2024</text>
    <rect x="30" y="450" width="280" height="35" fill="#ff6b6b" stroke="#ff6b6b" stroke-width="1" rx="3" opacity="0.8"/>
    <text x="170" y="473" font-size="12" fill="#fff" font-weight="bold" text-anchor="middle">❌ Remove</text>
    
    <!-- Card 2 -->
    <rect x="360" y="180" width="320" height="420" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="1" rx="6"/>
    <rect x="370" y="190" width="300" height="200" fill="#2a2a3e" stroke="#444" stroke-width="1" rx="4"/>
    <text x="520" y="280" font-size="10" fill="#999" text-anchor="middle">Poster 2</text>
    <text x="380" y="410" font-size="12" font-weight="bold" fill="#fff">Favorite Movie 2</text>
    <text x="380" y="430" font-size="11" fill="#bbb">⭐ 8.8 | 2023</text>
    <rect x="370" y="450" width="280" height="35" fill="#ff6b6b" stroke="#ff6b6b" stroke-width="1" rx="3" opacity="0.8"/>
    <text x="510" y="473" font-size="12" fill="#fff" font-weight="bold" text-anchor="middle">❌ Remove</text>
    
    <!-- Card 3 -->
    <rect x="700" y="180" width="320" height="420" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="1" rx="6"/>
    <rect x="710" y="190" width="300" height="200" fill="#2a2a3e" stroke="#444" stroke-width="1" rx="4"/>
    <text x="860" y="280" font-size="10" fill="#999" text-anchor="middle">Poster 3</text>
    <text x="720" y="410" font-size="12" font-weight="bold" fill="#fff">Favorite Movie 3</text>
    <text x="720" y="430" font-size="11" fill="#bbb">⭐ 8.5 | 2022</text>
    <rect x="710" y="450" width="280" height="35" fill="#ff6b6b" stroke="#ff6b6b" stroke-width="1" rx="3" opacity="0.8"/>
    <text x="850" y="473" font-size="12" fill="#fff" font-weight="bold" text-anchor="middle">❌ Remove</text>
    
    <!-- Card 4 -->
    <rect x="1040" y="180" width="320" height="420" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="1" rx="6"/>
    <rect x="1050" y="190" width="300" height="200" fill="#2a2a3e" stroke="#444" stroke-width="1" rx="4"/>
    <text x="1200" y="280" font-size="10" fill="#999" text-anchor="middle">Poster 4</text>
    <text x="1060" y="410" font-size="12" font-weight="bold" fill="#fff">Favorite Movie 4</text>
    <text x="1060" y="430" font-size="11" fill="#bbb">⭐ 8.2 | 2024</text>
    <rect x="1050" y="450" width="280" height="35" fill="#ff6b6b" stroke="#ff6b6b" stroke-width="1" rx="3" opacity="0.8"/>
    <text x="1190" y="473" font-size="12" fill="#fff" font-weight="bold" text-anchor="middle">❌ Remove</text>
  </g>
  
  <!-- Movie Cards Grid - Row 2 (Partial) -->
  <g id="favorites-row2">
    <!-- Card 5 -->
    <rect x="20" y="640" width="320" height="180" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="1" rx="6"/>
    <rect x="30" y="650" width="300" height="80" fill="#2a2a3e" stroke="#444" stroke-width="1" rx="4"/>
    <text x="180" y="690" font-size="10" fill="#999" text-anchor="middle">Poster 5</text>
    <text x="40" y="745" font-size="12" font-weight="bold" fill="#fff">Favorite Movie 5</text>
    <text x="40" y="763" font-size="11" fill="#bbb">⭐ 7.9 | 2021</text>
  </g>
  
  <!-- Clear All Button -->
  <rect x="500" y="680" width="400" height="45" fill="#ff6b6b" stroke="#ff6b6b" stroke-width="1" rx="4" opacity="0.8"/>
  <text x="700" y="710" font-size="13" fill="#fff" font-weight="bold" text-anchor="middle">🗑️ Clear All Favorites</text>
  
  <!-- Footer -->
  <text x="700" y="890" font-size="10" fill="#666" text-anchor="middle">Favorites / Wishlist Page (1400px × 900px)</text>
</svg>