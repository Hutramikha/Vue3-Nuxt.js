<svg viewBox="0 0 400 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="400" height="700" fill="#0f0f1e"/>
  
  <!-- Main Card Container -->
  <rect x="20" y="30" width="360" height="600" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="2" rx="8"/>
  
  <!-- Poster Image -->
  <rect x="40" y="50" width="320" height="240" fill="#2a2a3e" stroke="#6c5ce7" stroke-width="1" rx="6"/>
  <text x="200" y="175" font-size="14" fill="#999" text-anchor="middle" font-weight="bold">POSTER IMAGE</text>
  <text x="200" y="200" font-size="11" fill="#666" text-anchor="middle">(400px × 600px aspect)</text>
  
  <!-- Card Content Section -->
  <rect x="40" y="310" width="320" height="240" fill="#2a2a3e" stroke="#444" stroke-width="1" rx="4" opacity="0.5"/>
  
  <!-- Title -->
  <text x="50" y="340" font-size="14" font-weight="bold" fill="#ffffff">Movie Title Here</text>
  
  <!-- Rating Section -->
  <g id="rating-section">
    <text x="50" y="370" font-size="11" fill="#bbb">Rating:</text>
    <text x="110" y="370" font-size="13" fill="#ffd700" font-weight="bold">⭐ 8.5/10</text>
  </g>
  
  <!-- Year -->
  <g id="year-section">
    <text x="50" y="395" font-size="11" fill="#bbb">Year:</text>
    <text x="110" y="395" font-size="13" fill="#6c5ce7" font-weight="bold">2024</text>
  </g>
  
  <!-- Genre -->
  <g id="genre-section">
    <text x="50" y="420" font-size="11" fill="#bbb">Genre:</text>
    <text x="110" y="420" font-size="11" fill="#fff">Hành Động, Hài Hước</text>
    <text x="50" y="440" font-size="11" fill="#fff" opacity="0.8">Tâm Lý, Gia Đình</text>
  </g>
  
  <!-- Add to Favorites Button -->
  <rect x="40" y="480" width="320" height="50" fill="#6c5ce7" stroke="#6c5ce7" stroke-width="2" rx="6"/>
  <text x="200" y="515" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">❤️ Add to Favorites</text>
  
  <!-- Hover State Indicator -->
  <rect x="40" y="550" width="320" height="40" fill="#ff6b6b" stroke="#ff6b6b" stroke-width="1" rx="4" opacity="0.3"/>
  <text x="200" y="577" font-size="11" fill="#ff6b6b" text-anchor="middle" opacity="0.7">When clicked: Changes to red ❤️</text>
  
  <!-- Component Info -->
  <text x="200" y="650" font-size="10" fill="#666" text-anchor="middle">MovieCard Component</text>
  <text x="200" y="665" font-size="9" fill="#555" text-anchor="middle">Reusable across all views</text>
  <text x="200" y="680" font-size="9" fill="#555" text-anchor="middle">(400px × 700px)</text>
</svg>