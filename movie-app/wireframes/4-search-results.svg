<svg viewBox="0 0 1400 750" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="1400" height="750" fill="#0f0f1e"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1400" height="70" fill="#1a1a2e" stroke="#444" stroke-width="1"/>
  <text x="50" y="45" font-size="20" font-weight="bold" fill="#6c5ce7">🎬 KHANLIX</text>
  
  <!-- Search Bar -->
  <rect x="500" y="20" width="400" height="35" fill="#2a2a3e" stroke="#6c5ce7" stroke-width="1" rx="4"/>
  <text x="515" y="42" font-size="12" fill="#6c5ce7">🔍 Search "Avatar"</text>
  
  <!-- Results Header -->
  <rect x="40" y="100" width="1320" height="50" fill="#2a2a3e" stroke="#6c5ce7" stroke-width="1" rx="4"/>
  <text x="60" y="130" font-size="14" font-weight="bold" fill="#fff">Kết Quả Tìm Kiếm: Avatar (2 phim)</text>
  
  <!-- Movie Cards Grid -->
  <g id="search-results">
    <!-- Card 1 -->
    <rect x="40" y="180" width="320" height="380" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="1" rx="6"/>
    <rect x="50" y="190" width="300" height="180" fill="#2a2a3e" stroke="#444" stroke-width="1" rx="4"/>
    <text x="200" y="270" font-size="10" fill="#999" text-anchor="middle">Avatar 1</text>
    <text x="60" y="390" font-size="12" font-weight="bold" fill="#fff">Avatar: The Way of Water</text>
    <text x="60" y="410" font-size="11" fill="#bbb">⭐ 9.0 | 2022 | Sci-Fi</text>
    <rect x="50" y="430" width="280" height="30" fill="#6c5ce7" stroke="#6c5ce7" stroke-width="1" rx="3" opacity="0.8"/>
    <text x="190" y="450" font-size="12" fill="#fff" font-weight="bold" text-anchor="middle">❤️ Add to Favorites</text>
    
    <!-- Card 2 -->
    <rect x="380" y="180" width="320" height="380" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="1" rx="6"/>
    <rect x="390" y="190" width="300" height="180" fill="#2a2a3e" stroke="#444" stroke-width="1" rx="4"/>
    <text x="540" y="270" font-size="10" fill="#999" text-anchor="middle">Avatar 2</text>
    <text x="400" y="390" font-size="12" font-weight="bold" fill="#fff">Avatar: Original</text>
    <text x="400" y="410" font-size="11" fill="#bbb">⭐ 8.8 | 2009 | Sci-Fi</text>
    <rect x="390" y="430" width="280" height="30" fill="#6c5ce7" stroke="#6c5ce7" stroke-width="1" rx="3" opacity="0.8"/>
    <text x="530" y="450" font-size="12" fill="#fff" font-weight="bold" text-anchor="middle">❤️ Add to Favorites</text>
    
    <!-- Empty slots (greyed out) -->
    <rect x="720" y="180" width="320" height="380" fill="#1a1a2e" stroke="#444" stroke-width="1" rx="6" opacity="0.3"/>
    <rect x="730" y="190" width="300" height="180" fill="#2a2a3e" stroke="#444" stroke-width="1" rx="4" opacity="0.5"/>
    <text x="880" y="380" font-size="12" fill="#666" text-anchor="middle" opacity="0.5">No Results</text>
    
    <rect x="1060" y="180" width="320" height="380" fill="#1a1a2e" stroke="#444" stroke-width="1" rx="6" opacity="0.3"/>
    <rect x="1070" y="190" width="300" height="180" fill="#2a2a3e" stroke="#444" stroke-width="1" rx="4" opacity="0.5"/>
    <text x="1220" y="380" font-size="12" fill="#666" text-anchor="middle" opacity="0.5">No Results</text>
  </g>
  
  <!-- Pagination -->
  <text x="700" y="620" font-size="12" fill="#6c5ce7" text-anchor="middle" font-weight="bold">[◀ Prev] [1] [Next ▶]  (Phân trang 16 phim/trang)</text>
  
  <!-- Footer -->
  <text x="700" y="740" font-size="10" fill="#666" text-anchor="middle">Search Results Mode (1400px × 750px)</text>
</svg>