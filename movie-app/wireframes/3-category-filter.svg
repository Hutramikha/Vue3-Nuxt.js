    <text x="380" y="470" font-size="12" font-weight="bold" fill="#fff">Title 2</text>
    <text x="380" y="490" font-size="11" fill="#bbb">⭐ 9.0 | 2023</text>
    <rect x="370" y="510" width="280" height="30" fill="#6c5ce7" stroke="#6c5ce7" stroke-width="1" rx="3" opacity="0.8"/>
    <text x="510" y="530" font-size="12" fill="#fff" font-weight="bold" text-anchor="middle">❤️ Favorites</text>
    
    <!-- Card 3 -->
    <rect x="700" y="260" width="320" height="380" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="1" rx="6"/>
    <rect x="710" y="270" width="300" height="180" fill="#2a2a3e" stroke="#444" stroke-width="1" rx="4"/>
    <text x="860" y="350" font-size="10" fill="#999" text-anchor="middle">ID 13</text>
    <text x="720" y="470" font-size="12" font-weight="bold" fill="#fff">Title 3</text>
    <text x="720" y="490" font-size="11" fill="#bbb">⭐ 7.8 | 2022</text>
    <rect x="710" y="510" width="280" height="30" fill="#6c5ce7" stroke="#6c5ce7" stroke-width="1" rx="3" opacity="0.8"/>
    <text x="850" y="530" font-size="12" fill="#fff" font-weight="bold" text-anchor="middle">❤️ Favorites</text>
    
    <!-- Card 4 -->
    <rect x="1040" y="260" width="320" height="380" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="1" rx="6"/>
    <rect x="1050" y="270" width="300" height="180" fill="#2a2a3e" stroke="#444" stroke-width="1" rx="4"/>
    <text x="1200" y="350" font-size="10" fill="#999" text-anchor="middle">ID 14</text>
    <text x="1060" y="470" font-size="12" font-weight="bold" fill="#fff">Title 4</text>
    <text x="1060" y="490" font-size="11" fill="#bbb">⭐ 8.2 | 2024</text>
    <rect x="1050" y="510" width="280" height="30" fill="#6c5ce7" stroke="#6c5ce7" stroke-width="1" rx="3" opacity="0.8"/>
    <text x="1190" y="530" font-size="12" fill="#fff" font-weight="bold" text-anchor="middle">❤️ Favorites</text>
  </g>
  
  <!-- Pagination -->
  <text x="700" y="700" font-size="12" fill="#6c5ce7" text-anchor="middle" font-weight="bold">[◀ Prev] [1] [Next ▶]  (Phân trang 16 phim/trang)</text>
  
  <!-- Footer -->
  <text x="700" y="840" font-size="10" fill="#666" text-anchor="middle">Category Filter Mode (1400px × 850px)</text>
