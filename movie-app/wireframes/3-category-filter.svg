    <text x="40" y="470" font-size="12" font-weight="bold" fill="#fff">Title 1</text>
    <text x="40" y="490" font-size="11" fill="#bbb">⭐ 8.5 | 2024</text>
    <rect x="30" y="510" width="280" height="30" fill="#6c5ce7" stroke="#6c5ce7" stroke-width="1" rx="3" opacity="0.8"/>
    <text x="170" y="530" font-size="12" fill="#fff" font-weight="bold" text-anchor="middle">❤️ Favorites</text>
    
    <!-- Card 2 -->
    <rect x="360" y="260" width="320" height="380" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="1" rx="6"/>
    <rect x="370" y="270" width="300" height="180" fill="#2a2a3e" stroke="#444" stroke-width="1" rx="4"/>
