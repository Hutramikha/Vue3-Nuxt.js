<svg viewBox="0 0 1400 850" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="1400" height="850" fill="#0f0f1e"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1400" height="70" fill="#1a1a2e" stroke="#444" stroke-width="1"/>
  <text x="50" y="45" font-size="20" font-weight="bold" fill="#6c5ce7">🎬 KHANLIX</text>
  
  <!-- Category Buttons Section -->
  <text x="40" y="110" font-size="13" font-weight="bold" fill="#6c5ce7">Lọc Theo Danh Mục:</text>
  
  <g id="category-buttons">
    <rect x="40" y="125" width="120" height="35" fill="#6c5ce7" stroke="#6c5ce7" stroke-width="1" rx="4"/>
    <text x="100" y="148" font-size="11" fill="#fff" font-weight="bold" text-anchor="middle">📌 Phim Mới</text>
    
    <rect x="180" y="125" width="120" height="35" fill="#2a2a3e" stroke="#6c5ce7" stroke-width="1" rx="4"/>
    <text x="240" y="148" font-size="11" fill="#6c5ce7" font-weight="bold" text-anchor="middle">Phim Hot</text>
    
    <rect x="320" y="125" width="140" height="35" fill="#2a2a3e" stroke="#6c5ce7" stroke-width="1" rx="4"/>
    <text x="390" y="148" font-size="11" fill="#6c5ce7" font-weight="bold" text-anchor="middle">Xem Nhiều</text>
    
    <rect x="480" y="125" width="120" height="35" fill="#2a2a3e" stroke="#6c5ce7" stroke-width="1" rx="4"/>
    <text x="540" y="148" font-size="11" fill="#6c5ce7" font-weight="bold" text-anchor="middle">Trending</text>
    
    <rect x="620" y="125" width="120" height="35" fill="#2a2a3e" stroke="#6c5ce7" stroke-width="1" rx="4"/>
    <text x="680" y="148" font-size="11" fill="#6c5ce7" font-weight="bold" text-anchor="middle">Lẻ Mới</text>
  </g>
  
  <!-- Results Header -->
  <rect x="40" y="180" width="1320" height="50" fill="#2a2a3e" stroke="#6c5ce7" stroke-width="1" rx="4"/>
  <text x="60" y="210" font-size="14" font-weight="bold" fill="#fff">Phim Hot Hiện Tại (10 phim)</text>
  <text x="1280" y="210" font-size="11" fill="#999" text-anchor="end">[← Quay Lại Danh Mục]</text>
  
  <!-- Movie Cards Grid - Row 1 -->
  <g id="movie-cards-1">
    <!-- Card 1 -->
    <rect x="20" y="260" width="320" height="380" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="1" rx="6"/>
