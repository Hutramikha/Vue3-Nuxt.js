<svg viewBox="0 0 1400 1200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="1400" height="1200" fill="#0f0f1e"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1400" height="70" fill="#1a1a2e" stroke="#444" stroke-width="1"/>
  <text x="50" y="45" font-size="20" font-weight="bold" fill="#6c5ce7">🎬 KHANLIX</text>
  <text x="1350" y="45" font-size="12" fill="#bbb" text-anchor="end">❤️ ⚙️ 🔍</text>
  
  <!-- Breadcrumb Navigation -->
  <text x="50" y="110" font-size="11" fill="#999">Home / Movies / Movie Detail</text>
  
  <!-- Main Content Container -->
  <!-- Left Side: Poster & Basic Info -->
  <rect x="30" y="130" width="420" height="550" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="2" rx="8"/>
  
  <!-- Movie Poster -->
  <rect x="50" y="150" width="380" height="280" fill="#2a2a3e" stroke="#666" stroke-width="1" rx="6"/>
  <text x="240" y="290" font-size="14" fill="#999" text-anchor="middle" font-weight="bold">MOVIE POSTER</text>
  <text x="240" y="310" font-size="11" fill="#777" text-anchor="middle">(Aspect Ratio 2:3)</text>
  
  <!-- Movie Meta Info -->
  <text x="50" y="460" font-size="13" fill="#6c5ce7" font-weight="bold">Rating:</text>
  <text x="55" y="480" font-size="12" fill="#fff">⭐⭐⭐⭐⭐ 8.7/10 (1.2K votes)</text>
  
  <text x="50" y="510" font-size="13" fill="#6c5ce7" font-weight="bold">Release Date:</text>
  <text x="55" y="530" font-size="12" fill="#fff">December 15, 2023</text>
  
  <text x="50" y="560" font-size="13" fill="#6c5ce7" font-weight="bold">Duration:</text>
  <text x="55" y="580" font-size="12" fill="#fff">2h 42m</text>
  
  <text x="50" y="610" font-size="13" fill="#6c5ce7" font-weight="bold">Budget:</text>
  <text x="55" y="630" font-size="12" fill="#fff">$250 Million</text>
  
  <!-- Action Buttons -->
  <rect x="50" y="660" width="170" height="40" fill="#ff6b6b" stroke="#ff6b6b" stroke-width="1" rx="5"/>
  <text x="135" y="688" font-size="13" fill="#fff" font-weight="bold" text-anchor="middle">❤️ Add to Favorites</text>
  
  <rect x="240" y="660" width="170" height="40" fill="#6c5ce7" stroke="#6c5ce7" stroke-width="1" rx="5"/>
  <text x="325" y="688" font-size="13" fill="#fff" font-weight="bold" text-anchor="middle">▶️ Play Now</text>
  
  <!-- Right Side: Details -->
  <rect x="480" y="130" width="890" height="650" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="2" rx="8"/>
  
  <!-- Title -->
  <text x="510" y="165" font-size="28" fill="#fff" font-weight="bold">Avatar: The Way of Water</text>
  
  <!-- Subtitle Info -->
  <text x="510" y="195" font-size="13" fill="#999">Action, Adventure, Sci-Fi | 2023 | USA</text>
  
  <!-- Director & Cast -->
  <text x="510" y="230" font-size="12" fill="#6c5ce7" font-weight="bold">Director:</text>
  <text x="600" y="230" font-size="12" fill="#fff">James Cameron</text>
  
  <text x="510" y="255" font-size="12" fill="#6c5ce7" font-weight="bold">Cast:</text>
  <text x="600" y="255" font-size="12" fill="#fff">Sam Worthington, Zoe Saldana, Sigourney Weaver</text>
  
  <!-- Description Section -->
  <text x="510" y="290" font-size="13" fill="#6c5ce7" font-weight="bold">Synopsis:</text>
  <rect x="510" y="305" width="850" height="120" fill="#0f0f1e" stroke="#444" stroke-width="1" rx="4"/>
  <text x="530" y="330" font-size="12" fill="#bbb">Jake Sully and Neytiri have formed a family and are doing everything to stay together. When an ancient threat resurfaces, Jake must travel to the far frontiers of Pandora and team up with Neytiri and the army of the Na'vi race to protect their home.</text>
  <text x="530" y="365" font-size="12" fill="#bbb">This epic adventure delves deeper into the world of Pandora with stunning visuals and an immersive story that expands the universe in new and exciting ways...</text>
  
  <!-- Genre Tags -->
  <text x="510" y="450" font-size="13" fill="#6c5ce7" font-weight="bold">Genres:</text>
  <rect x="510" y="465" width="100" height="28" fill="#6c5ce7" stroke="#6c5ce7" stroke-width="1" rx="4" opacity="0.6"/>
  <text x="560" y="485" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">Action</text>
  
  <rect x="625" y="465" width="110" height="28" fill="#6c5ce7" stroke="#6c5ce7" stroke-width="1" rx="4" opacity="0.6"/>
  <text x="680" y="485" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">Adventure</text>
  
  <rect x="750" y="465" width="100" height="28" fill="#6c5ce7" stroke="#6c5ce7" stroke-width="1" rx="4" opacity="0.6"/>
  <text x="800" y="485" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">Sci-Fi</text>
  
  <!-- Video Player Preview -->
  <rect x="510" y="515" width="850" height="250" fill="#0a0a14" stroke="#6c5ce7" stroke-width="2" rx="6"/>
  <rect x="525" y="530" width="820" height="220" fill="#000" stroke="#444" stroke-width="1" rx="4"/>
  <text x="935" y="645" font-size="40" fill="#6c5ce7" text-anchor="middle" font-weight="bold">▶</text>
  <text x="935" y="705" font-size="12" fill="#999" text-anchor="middle">Video Player Preview / HD Quality</text>
  
  <!-- Bottom Section: Similar Movies -->
  <text x="50" y="850" font-size="16" fill="#6c5ce7" font-weight="bold">🎬 Similar Movies</text>
  
  <!-- Similar Movie Cards Row -->
  <g id="similar-cards">
    <!-- Card 1 -->
    <rect x="50" y="880" width="260" height="280" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="1" rx="6"/>
    <rect x="60" y="890" width="240" height="140" fill="#2a2a3e" stroke="#444" stroke-width="1" rx="4"/>
    <text x="180" y="960" font-size="10" fill="#999" text-anchor="middle">Poster</text>
    <text x="60" y="1050" font-size="11" font-weight="bold" fill="#fff">Avatar 1</text>
    <text x="60" y="1070" font-size="10" fill="#bbb">⭐ 8.5 • 2009</text>
    <rect x="60" y="1085" width="240" height="30" fill="#6c5ce7" stroke="#6c5ce7" stroke-width="1" rx="3" opacity="0.7"/>
    <text x="180" y="1105" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">♡ Add</text>
    
    <!-- Card 2 -->
    <rect x="330" y="880" width="260" height="280" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="1" rx="6"/>
    <rect x="340" y="890" width="240" height="140" fill="#2a2a3e" stroke="#444" stroke-width="1" rx="4"/>
    <text x="460" y="960" font-size="10" fill="#999" text-anchor="middle">Poster</text>
    <text x="340" y="1050" font-size="11" font-weight="bold" fill="#fff">Dune: Part Two</text>
    <text x="340" y="1070" font-size="10" fill="#bbb">⭐ 8.3 • 2024</text>
    <rect x="340" y="1085" width="240" height="30" fill="#6c5ce7" stroke="#6c5ce7" stroke-width="1" rx="3" opacity="0.7"/>
    <text x="460" y="1105" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">♡ Add</text>
    
    <!-- Card 3 -->
    <rect x="610" y="880" width="260" height="280" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="1" rx="6"/>
    <rect x="620" y="890" width="240" height="140" fill="#2a2a3e" stroke="#444" stroke-width="1" rx="4"/>
    <text x="740" y="960" font-size="10" fill="#999" text-anchor="middle">Poster</text>
    <text x="620" y="1050" font-size="11" font-weight="bold" fill="#fff">Inception</text>
    <text x="620" y="1070" font-size="10" fill="#bbb">⭐ 9.0 • 2010</text>
    <rect x="620" y="1085" width="240" height="30" fill="#6c5ce7" stroke="#6c5ce7" stroke-width="1" rx="3" opacity="0.7"/>
    <text x="740" y="1105" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">♡ Add</text>
    
    <!-- Card 4 -->
    <rect x="890" y="880" width="260" height="280" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="1" rx="6"/>
    <rect x="900" y="890" width="240" height="140" fill="#2a2a3e" stroke="#444" stroke-width="1" rx="4"/>
    <text x="1020" y="960" font-size="10" fill="#999" text-anchor="middle">Poster</text>
    <text x="900" y="1050" font-size="11" font-weight="bold" fill="#fff">Interstellar</text>
    <text x="900" y="1070" font-size="10" fill="#bbb">⭐ 8.8 • 2014</text>
    <rect x="900" y="1085" width="240" height="30" fill="#6c5ce7" stroke="#6c5ce7" stroke-width="1" rx="3" opacity="0.7"/>
    <text x="1020" y="1105" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">♡ Add</text>
    
    <!-- Card 5 (Overflow - Scroll) -->
    <rect x="1170" y="880" width="260" height="280" fill="#1a1a2e" stroke="#6c5ce7" stroke-width="1" rx="6"/>
    <rect x="1180" y="890" width="240" height="140" fill="#2a2a3e" stroke="#444" stroke-width="1" rx="4"/>
    <text x="1300" y="960" font-size="10" fill="#999" text-anchor="middle">Poster</text>
    <text x="1180" y="1050" font-size="11" font-weight="bold" fill="#fff">The Matrix</text>
    <text x="1180" y="1070" font-size="10" fill="#bbb">⭐ 8.6 • 1999</text>
    <rect x="1180" y="1085" width="240" height="30" fill="#6c5ce7" stroke="#6c5ce7" stroke-width="1" rx="3" opacity="0.7"/>
    <text x="1300" y="1105" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">♡ Add</text>
  </g>
  
  <!-- Scroll Indicator -->
  <text x="1350" y="920" font-size="12" fill="#6c5ce7" text-anchor="end" font-weight="bold">→</text>
  
  <!-- Footer -->
  <text x="700" y="1190" font-size="10" fill="#666" text-anchor="middle">Movie Detail Page (1400px × 1200px) - Responsive Layout</text>
</svg>
